# ═══════════════════════════════════════════════════════════════
# CATEGORY D: List workflows — compound ops (merge / split / restart / subpoint / nested)
#
# Fixtures:
#   document.docx  — two adjacent lists: bullet (4 items, nested) + ordered (3 items, lettered)
#                    Source of truth for merge / split / restart tasks.
#   basic-list.docx — simple nested bullet list (4 items L0/L1) + a 4-item ordered list.
#                    Used for sub-point and nested-construction tasks.
#
# All tasks set keepFile: true so the saved .docx feeds the fidelity + numbering-
# consistency guards below. Assertions follow the Level 3 pattern (correctness +
# collateral + fidelity + observational-zero-weight metrics).
# ═══════════════════════════════════════════════════════════════

- description: 'List: merge two adjacent lists into one'
  vars:
    fixture: document.docx
    keepFile: true
    task: 'The document has two adjacent lists — a bullet list that starts with "All sorts of bullets." and a numbered list that starts with "Numbers". Merge the numbered list into the bullet list so they become one continuous list. All item texts must be preserved.'
  assert:
    - type: javascript
      metric: correctness
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        const required = ['All sorts of bullets.', 'Nested lists', 'With', 'Lots of plenty of different icons', 'Numbers', 'Or letters', 'All sorts of lists are supported'];
        const missing = required.filter((s) => !t.includes(s));
        if (missing.length) return { pass: false, score: 0, reason: `Missing after merge: ${missing.join(', ')}` };
        return { pass: true, score: 1, reason: 'All 7 item texts preserved' };
    - type: javascript
      metric: collateral
      value: |
        const d = JSON.parse(output);
        if (d.documentChanged !== true) return { pass: false, score: 0, reason: 'documentChanged should be true' };
        const t = d.documentText || '';
        if (!t.includes('A list of list features')) return { pass: false, score: 0, reason: 'Document preamble removed' };
        return { pass: true, score: 1, reason: 'Preamble intact' };
    - type: javascript
      metric: numbering_font_consistency
      value: file://../shared/checks.cjs:checkNoSymbolFontsOnOrderedLevels
    - type: javascript
      metric: fidelity
      value: file://../shared/checks.cjs:benchmarkFidelity
    - type: javascript
      metric: diff
      weight: 0
      value: file://../shared/checks.cjs:benchmarkDiff
    - type: javascript
      metric: steps
      weight: 0
      value: file://../shared/checks.cjs:benchmarkSteps
    - type: javascript
      metric: latency
      weight: 0
      value: file://../shared/checks.cjs:benchmarkLatency
    - type: javascript
      metric: tokens
      weight: 0
      value: file://../shared/checks.cjs:benchmarkTokens
    - type: javascript
      metric: path
      value: file://../shared/checks.cjs:benchmarkPath

