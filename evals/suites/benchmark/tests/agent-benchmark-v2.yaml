# Level 3: DOCX Agent Benchmark — fidelity suite (v2)
#
# Tasks designed to test operations where SuperDoc's document model
# outperforms raw XML manipulation (unzip + sed).
#
# Category A: Structural creation (raw approaches can't produce valid OOXML)
# Category B: Formatting operations (raw approaches can't modify run properties)
# Category C: Complex edits (tracked changes, comments — track improvement over time)

# ═══════════════════════════════════════════════════════════════
# CATEGORY A: Structural creation — SuperDoc proven advantage
# ═══════════════════════════════════════════════════════════════

- description: 'Structure: create heading with style'
  vars:
    fixture: nda.docx
    keepFile: true
    task: 'Add a new section at the end of the document with a properly styled Heading 1 that says "Force Majeure" followed by a paragraph that says "Neither party shall be liable for delays or failures resulting from causes beyond reasonable control."'
    fidelityChecks: '[{"type":"paragraphStyle","text":"Force Majeure","style":"Heading1"}]'
  assert:
    - type: javascript
      metric: correctness
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('Force Majeure')) return { pass: false, score: 0, reason: 'Force Majeure not found' };
        if (!t.includes('beyond reasonable control')) return { pass: false, score: 0, reason: 'Body text not found' };
        return { pass: true, score: 1, reason: 'Section added' };
    - type: javascript
      metric: collateral
      value: |
        const d = JSON.parse(output);
        if (d.documentChanged !== true) return { pass: false, score: 0, reason: 'documentChanged should be true' };
        const t = d.documentText || '';
        if (!t.includes('Amazing') && !t.includes('Agreement')) return { pass: false, score: 0, reason: 'Original content removed' };
        return { pass: true, score: 1, reason: 'Original content preserved' };
    - type: javascript
      metric: fidelity
      value: file://../shared/checks.cjs:benchmarkFidelity
    - type: javascript
      metric: diff
      weight: 0
      value: file://../shared/checks.cjs:benchmarkDiff
    - type: javascript
      metric: steps
      weight: 0
      value: file://../shared/checks.cjs:benchmarkSteps
    - type: javascript
      metric: latency
      weight: 0
      value: file://../shared/checks.cjs:benchmarkLatency
    - type: javascript
      metric: tokens
      weight: 0
      value: file://../shared/checks.cjs:benchmarkTokens
    - type: javascript
      metric: path
      value: file://../shared/checks.cjs:benchmarkPath

- description: 'Structure: create table at end'
  vars:
    fixture: nda.docx
    keepFile: true
    task: 'Add a summary table at the end of the document with 2 columns ("Party" and "Role") and 2 data rows: "Amazing Corp" / "Disclosing Party" and "TechCraft LLC" / "Receiving Party". The table should have borders and a header row.'
    fidelityChecks: '[{"type":"tableCell","table":0,"row":1,"col":0,"text":"Amazing"},{"type":"tableCell","table":0,"row":1,"col":1,"text":"Disclosing"}]'
  assert:
    - type: javascript
      metric: correctness
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('Disclosing Party')) return { pass: false, score: 0, reason: 'Disclosing Party not in table' };
        if (!t.includes('Receiving Party')) return { pass: false, score: 0, reason: 'Receiving Party not in table' };
        return { pass: true, score: 1, reason: 'Table created correctly' };
    - type: javascript
      metric: collateral
      value: |
        const d = JSON.parse(output);
        if (d.documentChanged !== true) return { pass: false, score: 0, reason: 'documentChanged should be true' };
        return { pass: true, score: 1, reason: 'Document modified' };
    - type: javascript
      metric: fidelity
      value: file://../shared/checks.cjs:benchmarkFidelity
    - type: javascript
      metric: diff
      weight: 0
      value: file://../shared/checks.cjs:benchmarkDiff
    - type: javascript
      metric: steps
      weight: 0
      value: file://../shared/checks.cjs:benchmarkSteps
    - type: javascript
      metric: latency
      weight: 0
      value: file://../shared/checks.cjs:benchmarkLatency
    - type: javascript
      metric: tokens
      weight: 0
      value: file://../shared/checks.cjs:benchmarkTokens
    - type: javascript
      metric: path
      value: file://../shared/checks.cjs:benchmarkPath

