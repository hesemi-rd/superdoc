# Execution tests — real document editing via SuperDoc CLI + AI Gateway.
#
# Focus: tool execution MECHANICS, not just content outcomes.
# The provider returns JSON: { documentText, trace[], toolCalls[], stepCount }
#
# Each test validates:
#   1. TRACE: correct tool sequence, all calls succeeded, reasonable step count
#   2. CONTENT: minimal check that the edit actually worked (one assertion)

# =============================================================================
# DOCUMENT.DOCX — bullet lists
# =============================================================================

- description: 'Read: extracts document text'
  vars:
    fixture: document.docx
    keepFile: true
    task: 'Get the full text of this document.'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.documentText?.includes('A list of list features')) return { pass: false, score: 0, reason: 'Content missing' };
        return { pass: true, score: 1, reason: 'Content extracted' };
    - type: javascript
      value: file://../shared/checks.cjs:traceLog
    - type: javascript
      value: file://../shared/checks.cjs:traceAllOk

- description: 'Replace: bullets → bullet points'
  vars:
    fixture: document.docx
    keepFile: true
    task: 'Replace "bullets" with "bullet points" everywhere in the document.'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('bullet points') || t.includes('support bullets'))
          return { pass: false, score: 0, reason: 'Replace failed' };
        return { pass: true, score: 1, reason: 'Content correct' };
    - type: javascript
      value: file://../shared/checks.cjs:traceAllOk
    - type: javascript
      value: file://../shared/checks.cjs:traceLog
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.trace) return { pass: true, score: 0.5, reason: 'No trace data' };
        const count = d.stepCount || d.trace.length;
        if (count > 6) return { pass: false, score: 0, reason: `${count} steps — too many for a simple replace` };
        return { pass: true, score: 1, reason: `${count} steps` };
      metric: efficiency

- description: 'Insert: paragraph at end'
  vars:
    fixture: document.docx
    keepFile: true
    task: 'Add a new paragraph at the end of the document that says exactly "EVAL TEST PASSED".'
  assert:
    - type: javascript
      value: |
